name: ml-server

on:
  push:
    branches: ["main"]
    paths:
      - "ml-server/**"
      - ".github/workflows/ml-server.yml"

concurrency:
  group: deploy-ml-main
  cancel-in-progress: true

jobs:
  build-and-push-ml:
    runs-on: ubuntu-24.04-arm

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push ML Image
        uses: docker/build-push-action@v6
        with:
          context: ./ml-server
          file: ./ml-server/Dockerfile
          platforms: linux/arm64
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/ml-server:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/ml-server:arm64
          cache-from: |
            type=gha,scope=ml-server
            type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/ml-server:buildcache
          cache-to: |
            type=gha,mode=max,scope=ml-server
            type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/ml-server:buildcache,mode=max
          provenance: false

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push-ml

    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -e
            cd /home/ubuntu/interview
            docker compose pull ml-server
            docker compose up -d ml-server
            docker system prune -f
            echo "✅ ML 서버 배포 완료"
